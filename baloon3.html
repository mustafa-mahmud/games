<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Balloon Pop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #gameContainer {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
  }
  #uiOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  #uiOverlay button, #uiOverlay .screen {
    pointer-events: auto;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    z-index: 10;
  }
  #scoreDisplay {
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 700;
    color: #fff;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }
  #livesDisplay {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .heart {
    font-size: clamp(20px, 4.5vw, 30px);
    color: #ff4757;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.4));
    transition: opacity 0.3s, transform 0.3s;
  }
  .heart.lost {
    opacity: 0.2;
    transform: scale(0.85);
  }
  .screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(2px);
    z-index: 20;
    gap: 20px;
    padding: 20px;
    text-align: center;
  }
  .screen.hidden { display: none; }
  .screen h1 {
    font-size: clamp(32px, 8vw, 64px);
    font-weight: 800;
    color: #fff;
    text-shadow: 3px 3px 0 rgba(255,100,100,0.6), 0 0 30px rgba(255,150,50,0.5);
    letter-spacing: 2px;
    line-height: 1.2;
  }
  .screen h2 {
    font-size: clamp(20px, 5vw, 36px);
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
  .screen .subtitle {
    font-size: clamp(14px, 3.5vw, 20px);
    color: #eee;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    opacity: 0.9;
    max-width: 400px;
  }
  .screen .score-text {
    font-size: clamp(18px, 5vw, 28px);
    color: #ffe66d;
    font-weight: 700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
  .screen .high-score {
    font-size: clamp(14px, 3.5vw, 18px);
    color: #ccc;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }
  .screen button {
    padding: 16px 48px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    box-shadow: 0 6px 20px rgba(238,90,36,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
    min-height: 54px;
    min-width: 180px;
  }
  .screen button:hover, .screen button:active {
    transform: scale(1.05);
    box-shadow: 0 8px 28px rgba(238,90,36,0.7), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .screen button:active { transform: scale(0.97); }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="uiOverlay">
    <div id="hud">
      <div id="scoreDisplay">Score: 0</div>
      <div id="livesDisplay"></div>
    </div>
    <div id="startScreen" class="screen">
      <h1>🎈 Balloon Pop</h1>
      <p class="subtitle">Tap or click balloons to pop them before they escape! Don't let them reach the top.</p>
      <button id="startBtn">Play</button>
    </div>
    <div id="gameOverScreen" class="screen hidden">
      <h2>Game Over</h2>
      <div class="score-text" id="finalScore">Score: 0</div>
      <div class="high-score" id="highScoreText">High Score: 0</div>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const livesDisplay = document.getElementById('livesDisplay');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const highScoreTextEl = document.getElementById('highScoreText');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');

  let W, H, dpr;
  let gameState = 'start'; // start, playing, gameover
  let score = 0;
  let lives = 3;
  let highScore = parseInt(localStorage.getItem('balloonPopHighScore') || '0', 10);
  let balloons = [];
  let particles = [];
  let clouds = [];
  let spawnTimer = 0;
  let currentSpawnInterval = 90; // frames between spawns
  let currentRiseSpeed = 1.2;
  let difficultyTimer = 0;
  let shakeTimer = 0;
  let shakeIntensity = 0;
  let lastTime = 0;
  let frameCount = 0;

  const BALLOON_COLORS = [
    { name: 'red', body: '#ff4757', highlight: '#ff6b81', shadow: '#c0392b' },
    { name: 'blue', body: '#3742fa', highlight: '#5f6cff', shadow: '#1e27b8' },
    { name: 'yellow', body: '#ffa502', highlight: '#ffbe44', shadow: '#d4850a' },
    { name: 'green', body: '#2ed573', highlight: '#5eea9a', shadow: '#1d9e55' },
    { name: 'purple', body: '#a55eea', highlight: '#c48fff', shadow: '#7d3cb8' },
    { name: 'orange', body: '#ff7f50', highlight: '#ff9e80', shadow: '#d45a2e' },
    { name: 'pink', body: '#ff6b9d', highlight: '#ff92b8', shadow: '#d44a7a' },
    { name: 'cyan', body: '#00d2d3', highlight: '#44e5e7', shadow: '#009a9b' },
  ];

  const SPECIAL_COLORS = [
    { name: 'golden', body: '#ffd700', highlight: '#ffec6e', shadow: '#c9a800', points: 5 },
    { name: 'rainbow', body: '#e056fd', highlight: '#ff9ff3', shadow: '#be2edd', points: 8 },
  ];

  // Audio context (created on user interaction)
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(freq, duration, type = 'square', volume = 0.08, glideTo = null) {
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
      gain.gain.setValueAtTime(volume, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + duration);
    } catch(e) {}
  }
  function playPop() {
    playTone(600, 0.1, 'square', 0.06, 200);
    playTone(800, 0.08, 'triangle', 0.04, 400);
    playTone(300, 0.15, 'sawtooth', 0.03);
  }
  function playMiss() {
    playTone(200, 0.2, 'sawtooth', 0.05, 120);
    playTone(150, 0.25, 'triangle', 0.04, 80);
  }
  function playGameOver() {
    playTone(400, 0.15, 'square', 0.06, 300);
    setTimeout(() => playTone(300, 0.15, 'square', 0.06, 200), 120);
    setTimeout(() => playTone(200, 0.25, 'square', 0.06, 120), 240);
  }

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    generateClouds();
  }

  function generateClouds() {
    clouds = [];
    const count = Math.floor(H / 180) + 2;
    for (let i = 0; i < count; i++) {
      clouds.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.7,
        w: 80 + Math.random() * 140,
        h: 30 + Math.random() * 50,
        speed: 0.15 + Math.random() * 0.35,
        opacity: 0.3 + Math.random() * 0.4,
      });
    }
  }

  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#87ceeb');
    grad.addColorStop(0.5, '#b0e0f0');
    grad.addColorStop(1, '#e0f7fa');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    clouds.forEach(c => {
      c.x += c.speed;
      if (c.x > W + c.w) c.x = -c.w * 2;
      ctx.fillStyle = `rgba(255,255,255,${c.opacity})`;
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x - c.w * 0.25, c.y + c.h * 0.15, c.w * 0.35, c.h * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.25, c.y + c.h * 0.1, c.w * 0.3, c.h * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  class Balloon {
    constructor() {
      const isSpecial = Math.random() < 0.08;
      if (isSpecial) {
        const sp = SPECIAL_COLORS[Math.floor(Math.random() * SPECIAL_COLORS.length)];
        this.color = sp;
        this.points = sp.points;
        this.isSpecial = true;
      } else {
        this.color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
        this.points = 1;
        this.isSpecial = false;
      }
      this.radius = 22 + Math.random() * 14;
      this.x = this.radius + Math.random() * (W - this.radius * 2);
      this.y = H + this.radius + Math.random() * 60;
      this.speed = currentRiseSpeed * (0.85 + Math.random() * 0.4);
      this.wobbleAmp = 0.4 + Math.random() * 1.2;
      this.wobbleSpeed = 0.02 + Math.random() * 0.04;
      this.wobbleOffset = Math.random() * Math.PI * 2;
      this.popped = false;
      this.popScale = 1;
      this.popAlpha = 1;
      this.phase = 'rising';
    }
    update() {
      if (this.phase === 'popping') {
        this.popScale += (1.5 - this.popScale) * 0.3;
        this.popAlpha -= 0.12;
        if (this.popAlpha <= 0) this.phase = 'dead';
        return;
      }
      if (this.phase === 'dead') return;
      this.y -= this.speed;
      this.wobbleOffset += this.wobbleSpeed;
      if (this.y < -this.radius * 3) {
        this.phase = 'escaped';
      }
    }
    draw() {
      if (this.phase === 'dead') return;
      const wx = Math.sin(this.wobbleOffset) * this.wobbleAmp * 30;
      const cx = this.x + wx;
      const cy = this.y;
      let r = this.radius;
      let alpha = 1;
      if (this.phase === 'popping') {
        r = this.radius * this.popScale;
        alpha = this.popAlpha;
      }
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(cx, cy);

      // String
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, r * 0.85);
      ctx.quadraticCurveTo(wx * 0.4, r * 1.4, 0, r * 1.8 + Math.sin(frameCount * 0.05 + this.wobbleOffset) * 3);
      ctx.stroke();

      // Balloon body
      const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
      grad.addColorStop(0, this.color.highlight);
      grad.addColorStop(0.5, this.color.body);
      grad.addColorStop(1, this.color.shadow);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, 0, r, r * 1.15, 0, 0, Math.PI * 2);
      ctx.fill();

      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.ellipse(-r * 0.25, -r * 0.25, r * 0.3, r * 0.18, -0.4, 0, Math.PI * 2);
      ctx.fill();

      // Knot
      ctx.fillStyle = this.color.shadow;
      ctx.beginPath();
      ctx.moveTo(-r * 0.2, r * 1.05);
      ctx.lineTo(0, r * 1.2);
      ctx.lineTo(r * 0.2, r * 1.05);
      ctx.closePath();
      ctx.fill();

      if (this.isSpecial) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.arc(0, 0, r + 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      ctx.restore();
    }
    hitTest(px, py) {
      const wx = Math.sin(this.wobbleOffset) * this.wobbleAmp * 30;
      const dx = px - (this.x + wx);
      const dy = py - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      return dist < this.radius * 1.2;
    }
  }

  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      this.vx = (Math.random() - 0.5) * 10;
      this.vy = (Math.random() - 0.8) * 10;
      this.life = 1;
      this.decay = 0.02 + Math.random() * 0.03;
      this.size = 2 + Math.random() * 5;
      this.color = color;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.2;
      this.gravity = 0.15;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.vx *= 0.98;
      this.life -= this.decay;
      this.rotation += this.rotSpeed;
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
      ctx.restore();
    }
  }

  function spawnBalloon() {
    balloons.push(new Balloon());
  }

  function popBalloon(b, px, py) {
    if (b.phase !== 'rising') return;
    b.phase = 'popping';
    b.popped = true;
    score += b.points;
    updateHUD();
    playPop();
    // Spawn particles
    const wx = Math.sin(b.wobbleOffset) * b.wobbleAmp * 30;
    const cx = b.x + wx;
    const cy = b.y;
    for (let i = 0; i < 18; i++) {
      particles.push(new Particle(cx, cy, [b.color.body, b.color.highlight, b.color.shadow][Math.floor(Math.random() * 3)]));
    }
    for (let i = 0; i < 8; i++) {
      particles.push(new Particle(cx, cy, '#fff'));
    }
  }

  function loseLife() {
    lives--;
    updateHUD();
    playMiss();
    shakeTimer = 18;
    shakeIntensity = 6;
    if (lives <= 0) {
      endGame();
    }
  }

  function updateHUD() {
    scoreDisplay.textContent = `Score: ${score}`;
    const hearts = livesDisplay.querySelectorAll('.heart');
    hearts.forEach((h, i) => {
      h.classList.toggle('lost', i >= lives);
    });
  }

  function buildLives() {
    livesDisplay.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const span = document.createElement('span');
      span.className = 'heart';
      span.textContent = '♥';
      livesDisplay.appendChild(span);
    }
  }

  function startGame() {
    initAudio();
    gameState = 'playing';
    score = 0;
    lives = 3;
    balloons = [];
    particles = [];
    spawnTimer = 0;
    currentSpawnInterval = 90;
    currentRiseSpeed = 1.2;
    difficultyTimer = 0;
    shakeTimer = 0;
    frameCount = 0;
    buildLives();
    updateHUD();
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
  }

  function endGame() {
    gameState = 'gameover';
    playGameOver();
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('balloonPopHighScore', String(highScore));
    }
    finalScoreEl.textContent = `Score: ${score}`;
    highScoreTextEl.textContent = `High Score: ${highScore}`;
    gameOverScreen.classList.remove('hidden');
  }

  function handleInput(cx, cy) {
    if (gameState !== 'playing') return;
    for (let i = balloons.length - 1; i >= 0; i--) {
      if (balloons[i].hitTest(cx, cy)) {
        popBalloon(balloons[i], cx, cy);
        break;
      }
    }
  }

  canvas.addEventListener('mousedown', e => {
    handleInput(e.clientX, e.clientY);
  });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      handleInput(touch.clientX, touch.clientY);
    }
  }, { passive: false });

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min(timestamp - lastTime, 33);
    lastTime = timestamp;

    if (gameState === 'playing') {
      frameCount++;
      difficultyTimer++;

      // Difficulty scaling
      if (difficultyTimer % 600 === 0) {
        currentSpawnInterval = Math.max(25, currentSpawnInterval - 8);
        currentRiseSpeed = Math.min(3.5, currentRiseSpeed + 0.2);
      }

      spawnTimer++;
      if (spawnTimer >= currentSpawnInterval) {
        spawnTimer = 0;
        spawnBalloon();
      }

      // Update balloons
      for (let i = balloons.length - 1; i >= 0; i--) {
        balloons[i].update();
        if (balloons[i].phase === 'escaped') {
          balloons.splice(i, 1);
          loseLife();
        } else if (balloons[i].phase === 'dead') {
          balloons.splice(i, 1);
        }
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
      }

      if (shakeTimer > 0) shakeTimer--;
    }

    // Render
    ctx.save();
    if (shakeTimer > 0) {
      const sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 18);
      const sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 18);
      ctx.translate(sx, sy);
    }

    drawBackground();

    // Draw balloons (sort by y for depth)
    balloons.sort((a, b) => a.y - b.y);
    balloons.forEach(b => b.draw());

    // Draw particles
    particles.forEach(p => p.draw());

    ctx.restore();
  }

  resize();
  buildLives();
  updateHUD();
  requestAnimationFrame(gameLoop);
})();
</script>
</body>
</html>
