<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zombie Survival</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
  }
  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
  }
  canvas {
    display: block;
    background: #111;
    box-shadow: 0 0 40px rgba(0, 200, 255, 0.15);
    cursor: crosshair;
    image-rendering: pixelated;
  }
  #hud {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 10px 24px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 999px;
    color: #eee;
    font-size: 16px;
    pointer-events: none;
    z-index: 10;
    backdrop-filter: blur(4px);
  }
  #hud .label {
    color: #aaa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 6px;
  }
  #hud .value {
    font-weight: bold;
    font-variant-numeric: tabular-nums;
  }
  #score-value {
    color: #ffd700;
  }
  #health-bar-wrapper {
    width: 140px;
    height: 10px;
    background: #333;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #health-bar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #ff3b3b, #ff6b6b);
    transition: width 0.2s ease;
    border-radius: 999px;
  }
  #start-screen, #game-over-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.85);
    z-index: 20;
    color: #eee;
    text-align: center;
    backdrop-filter: blur(6px);
  }
  #start-screen h1, #game-over-screen h1 {
    font-size: 56px;
    margin-bottom: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ff3b3b, #ff8a00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #start-screen .subtitle, #game-over-screen .subtitle {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 32px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .controls-info {
    margin-bottom: 32px;
    color: #ccc;
    line-height: 1.8;
    font-size: 14px;
  }
  .controls-info span {
    color: #00d4ff;
    font-weight: bold;
  }
  button {
    padding: 14px 48px;
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    background: linear-gradient(135deg, #ff3b3b, #ff8a00);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255, 59, 59, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 28px rgba(255, 59, 59, 0.6);
  }
  button:active {
    transform: scale(0.97);
  }
  #final-score {
    font-size: 64px;
    font-weight: bold;
    color: #ffd700;
    margin: 16px 0;
  }
  .hidden {
    display: none !important;
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas"></canvas>
  <div id="hud" class="hidden">
    <div><span class="label">Score</span><span class="value" id="score-value">0</span></div>
    <div><span class="label">Health</span>
      <div id="health-bar-wrapper"><div id="health-bar"></div></div>
    </div>
  </div>
  <div id="start-screen">
    <h1>Zombie Survival</h1>
    <div class="subtitle">How long can you survive?</div>
    <div class="controls-info">
      <span>W A S D</span> or <span>Arrow Keys</span> to move<br/>
      <span>Mouse</span> to aim &bull; <span>Left Click</span> to shoot
    </div>
    <button id="start-btn">Start Game</button>
  </div>
  <div id="game-over-screen" class="hidden">
    <h1>Game Over</h1>
    <div class="subtitle">You survived until wave</div>
    <div id="final-score">0</div>
    <button id="restart-btn">Play Again</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('start-screen');
  const gameOverScreen = document.getElementById('game-over-screen');
  const hud = document.getElementById('hud');
  const scoreEl = document.getElementById('score-value');
  const finalScoreEl = document.getElementById('final-score');
  const healthBar = document.getElementById('health-bar');

  let W, H;
  const resize = () => {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };
  window.addEventListener('resize', resize);
  resize();

  // Audio
  let audioCtx;
  const initAudio = () => {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  };

  const playShoot = () => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
  };

  const playZombieDeath = () => {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(600, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    noise.connect(filter).connect(gain).connect(audioCtx.destination);
    noise.start();
    noise.stop(audioCtx.currentTime + 0.15);
  };

  const playPlayerDamage = () => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
  };

  const playGameOver = () => {
    if (!audioCtx) return;
    const notes = [220, 185, 155, 130, 110];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + i * 0.25;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.4);
    });
  };

  // Input
  const keys = {};
  const mouse = { x: W / 2, y: H / 2, down: false };
  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });
  canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
  canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Game state
  let running = false;
  let score = 0;
  let lastShot = 0;
  const SHOOT_COOLDOWN = 120;

  class Player {
    constructor() {
      this.x = W / 2;
      this.y = H / 2;
      this.r = 14;
      this.speed = 4.5;
      this.hp = 100;
      this.maxHp = 100;
      this.angle = 0;
    }
    update() {
      let dx = 0, dy = 0;
      if (keys['w'] || keys['arrowup']) dy -= 1;
      if (keys['s'] || keys['arrowdown']) dy += 1;
      if (keys['a'] || keys['arrowleft']) dx -= 1;
      if (keys['d'] || keys['arrowright']) dx += 1;
      if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        dx /= len;
        dy /= len;
      }
      this.x = Math.max(this.r, Math.min(W - this.r, this.x + dx * this.speed));
      this.y = Math.max(this.r, Math.min(H - this.r, this.y + dy * this.speed));
      this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      // body
      ctx.beginPath();
      ctx.arc(0, 0, this.r, 0, Math.PI * 2);
      ctx.fillStyle = '#00aaff';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#005577';
      ctx.stroke();
      // gun barrel
      ctx.fillStyle = '#ccc';
      ctx.fillRect(this.r - 2, -3, 12, 6);
      ctx.fillStyle = '#888';
      ctx.fillRect(this.r + 4, -2, 6, 4);
      ctx.restore();
    }
  }

  class Bullet {
    constructor(x, y, angle) {
      this.x = x;
      this.y = y;
      this.vx = Math.cos(angle) * 10;
      this.vy = Math.sin(angle) * 10;
      this.r = 3.5;
      this.alive = true;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) {
        this.alive = false;
      }
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = '#ffd700';
      ctx.fill();
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#ffa500';
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  class Zombie {
    constructor() {
      this.r = 13 + Math.random() * 5;
      const side = Math.floor(Math.random() * 4);
      if (side === 0) { this.x = Math.random() * W; this.y = -this.r; }
      else if (side === 1) { this.x = W + this.r; this.y = Math.random() * H; }
      else if (side === 2) { this.x = Math.random() * W; this.y = H + this.r; }
      else { this.x = -this.r; this.y = Math.random() * H; }
      this.speed = 1.2 + Math.random() * 0.8;
      this.hp = 2;
      this.alive = true;
      this.wobble = Math.random() * Math.PI * 2;
    }
    update(player) {
      const angle = Math.atan2(player.y - this.y, player.x - this.x);
      this.x += Math.cos(angle) * this.speed;
      this.y += Math.sin(angle) * this.speed;
      this.wobble += 0.1;
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      const offset = Math.sin(this.wobble) * 1.5;
      ctx.beginPath();
      ctx.arc(0, offset, this.r, 0, Math.PI * 2);
      ctx.fillStyle = '#2ecc71';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#1a8c4a';
      ctx.stroke();
      // eyes
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(-4, offset - 2, 2.5, 0, Math.PI * 2);
      ctx.arc(4, offset - 2, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * 3 + 1;
      this.vx = Math.cos(a) * s;
      this.vy = Math.sin(a) * s;
      this.life = 1;
      this.decay = 0.04 + Math.random() * 0.03;
      this.r = 2 + Math.random() * 3;
      this.color = color;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.96;
      this.vy *= 0.96;
      this.life -= this.decay;
    }
    draw() {
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  let player, bullets, zombies, particles;
  let spawnTimer = 0;
  let spawnInterval = 60;
  let gameTime = 0;
  let animId;

  const init = () => {
    player = new Player();
    bullets = [];
    zombies = [];
    particles = [];
    score = 0;
    spawnTimer = 0;
    spawnInterval = 60;
    gameTime = 0;
    lastShot = 0;
    scoreEl.textContent = '0';
    healthBar.style.width = '100%';
    hud.classList.remove('hidden');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    running = true;
    if (animId) cancelAnimationFrame(animId);
    loop();
  };

  const spawnZombie = () => {
    zombies.push(new Zombie());
  };

  const spawnParticles = (x, y, color, count) => {
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(x, y, color));
    }
  };

  const circleCollision = (a, b) => {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    const dist = Math.hypot(dx, dy);
    return dist < a.r + b.r;
  };

  const endGame = () => {
    running = false;
    playGameOver();
    finalScoreEl.textContent = score;
    hud.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
  };

  const loop = () => {
    if (!running) return;
    animId = requestAnimationFrame(loop);
    gameTime++;
    ctx.clearRect(0, 0, W, H);

    // Draw subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    for (let x = 0; x < W; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Difficulty scaling
    spawnInterval = Math.max(15, 60 - Math.floor(gameTime / 600));

    // Spawn
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnZombie();
    }

    player.update();

    // Shooting
    const now = performance.now();
    if (mouse.down && now - lastShot > SHOOT_COOLDOWN) {
      lastShot = now;
      const bx = player.x + Math.cos(player.angle) * (player.r + 6);
      const by = player.y + Math.sin(player.angle) * (player.r + 6);
      bullets.push(new Bullet(bx, by, player.angle));
      playShoot();
    }

    // Update bullets
    for (const b of bullets) b.update();
    bullets = bullets.filter(b => b.alive);

    // Update zombies
    for (const z of zombies) z.update(player);

    // Bullet vs zombie
    for (const b of bullets) {
      if (!b.alive) continue;
      for (const z of zombies) {
        if (!z.alive) continue;
        if (circleCollision(b, z)) {
          b.alive = false;
          z.hp--;
          if (z.hp <= 0) {
            z.alive = false;
            score += 10;
            scoreEl.textContent = score;
            spawnParticles(z.x, z.y, '#2ecc71', 8);
            playZombieDeath();
          } else {
            spawnParticles(b.x, b.y, '#ffd700', 3);
          }
          break;
        }
      }
    }
    zombies = zombies.filter(z => z.alive);

    // Zombie vs player
    for (const z of zombies) {
      if (!z.alive) continue;
      if (circleCollision(z, player)) {
        z.alive = false;
        player.hp -= 15;
        spawnParticles(player.x, player.y, '#ff3b3b', 6);
        playPlayerDamage();
        if (player.hp <= 0) {
          player.hp = 0;
          endGame();
          return;
        }
        healthBar.style.width = (player.hp / player.maxHp * 100) + '%';
      }
    }
    zombies = zombies.filter(z => z.alive);

    // Particles
    for (const p of particles) p.update();
    particles = particles.filter(p => p.life > 0);

    // Draw
    for (const p of particles) p.draw();
    for (const b of bullets) b.draw();
    for (const z of zombies) z.draw();
    player.draw();
  };

  document.getElementById('start-btn').addEventListener('click', () => {
    initAudio();
    init();
  });

  document.getElementById('restart-btn').addEventListener('click', () => {
    initAudio();
    init();
  });

  // Initial render
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);
})();
</script>
</body>
</html>
