<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZigZag Line</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ─────────────────────────────────────
// Constants
// ─────────────────────────────────────
const SEGMENT_LENGTH = 100;
const ANGLE = Math.PI / 5; // 36 degrees
const PATH_WIDTH = 22;
const BALL_RADIUS = 7;
const INITIAL_SPEED = 200; // pixels per second
const MAX_SPEED = 420;
const SPEED_INCREMENT = 2.5;
const GRAVITY = 1600;
const PARTICLE_COUNT_TURN = 10;
const PARTICLE_COUNT_FALL = 30;

// ─────────────────────────────────────
// Game State
// ─────────────────────────────────────
let gameState = 'start'; // 'start' | 'playing' | 'gameover'
let score = 0;
let bestScore = parseInt(localStorage.getItem('zigzagBest')) || 0;

// ─────────────────────────────────────
// Path
// ─────────────────────────────────────
let segments = [];

// ─────────────────────────────────────
// Ball
// ─────────────────────────────────────
let ball = {
    x: 0,
    y: 0,
    currentSegment: 0,
    progress: 0,
    speed: INITIAL_SPEED,
    falling: false,
    fallVx: 0,
    fallVy: 0
};

// ─────────────────────────────────────
// Camera
// ─────────────────────────────────────
let cameraY = 0;

// ─────────────────────────────────────
// Particles
// ─────────────────────────────────────
let particles = [];

// ─────────────────────────────────────
// Input
// ─────────────────────────────────────
let inputPressed = false;

// ─────────────────────────────────────
// Timing
// ─────────────────────────────────────
let lastTime = 0;

// ─────────────────────────────────────
// Canvas Setup
// ─────────────────────────────────────
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

// ─────────────────────────────────────
// Path Generation
// ─────────────────────────────────────
function generateSegment(startX, startY, direction) {
    const endX = startX + Math.sin(direction * ANGLE) * SEGMENT_LENGTH;
    const endY = startY - Math.cos(direction * ANGLE) * SEGMENT_LENGTH;
    return { startX, startY, endX, endY, direction };
}

function generatePath() {
    segments = [];
    let x = canvas.width / 2;
    let y = canvas.height - 150;
    let direction = 1;

    for (let i = 0; i < 200; i++) {
        segments.push(generateSegment(x, y, direction));
        x += Math.sin(direction * ANGLE) * SEGMENT_LENGTH;
        y -= Math.cos(direction * ANGLE) * SEGMENT_LENGTH;
        direction *= -1;
    }
}

function addMoreSegments() {
    if (segments.length === 0) return;
    let last = segments[segments.length - 1];
    let x = last.endX;
    let y = last.endY;
    let direction = last.direction * -1;

    for (let i = 0; i < 100; i++) {
        segments.push(generateSegment(x, y, direction));
        x += Math.sin(direction * ANGLE) * SEGMENT_LENGTH;
        y -= Math.cos(direction * ANGLE) * SEGMENT_LENGTH;
        direction *= -1;
    }
}

// ─────────────────────────────────────
// Game Control
// ─────────────────────────────────────
function resetGame() {
    score = 0;
    ball.currentSegment = 0;
    ball.progress = 0;
    ball.speed = INITIAL_SPEED;
    ball.falling = false;
    ball.fallVx = 0;
    ball.fallVy = 0;
    ball.x = segments[0].startX;
    ball.y = segments[0].startY;
    cameraY = 0;
    particles = [];
    inputPressed = false;
}

function startGame() {
    gameState = 'playing';
    resetGame();
}

function endGame() {
    gameState = 'gameover';
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('zigzagBest', bestScore.toString());
    }
}

// ─────────────────────────────────────
// Particles
// ─────────────────────────────────────
function spawnParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 80 + Math.random() * 250;
        const life = 0.3 + Math.random() * 0.5;
        particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life,
            maxLife: life,
            color: color || `hsl(${Math.random() * 60 + 280}, 100%, 60%)`,
            radius: 2 + Math.random() * 3
        });
    }
}

// ─────────────────────────────────────
// Update
// ─────────────────────────────────────
function update(dt) {
    if (gameState !== 'playing') return;

    if (!ball.falling) {
        // Move ball along current segment
        ball.progress += (ball.speed * dt) / SEGMENT_LENGTH;

        if (ball.progress >= 1) {
            // Reached end of segment — check for input
            if (inputPressed) {
                // Successful turn onto next segment
                ball.currentSegment++;
                ball.progress = 0;
                score++;
                inputPressed = false;

                spawnParticles(ball.x, ball.y, PARTICLE_COUNT_TURN, '#00ffff');

                // Gradually increase speed
                ball.speed = Math.min(MAX_SPEED, INITIAL_SPEED + score * SPEED_INCREMENT);

                // Generate more path if running low
                if (ball.currentSegment > segments.length - 30) {
                    addMoreSegments();
                }
            } else {
                // Missed the turn — fall off the path
                ball.falling = true;
                const seg = segments[ball.currentSegment];
                const dirX = (seg.endX - seg.startX) / SEGMENT_LENGTH;
                const dirY = (seg.endY - seg.startY) / SEGMENT_LENGTH;
                ball.fallVx = dirX * ball.speed;
                ball.fallVy = dirY * ball.speed;
                spawnParticles(ball.x, ball.y, PARTICLE_COUNT_FALL, '#ff0066');
            }
        }

        // Update ball position
        if (!ball.falling && ball.currentSegment < segments.length) {
            const seg = segments[ball.currentSegment];
            ball.x = seg.startX + (seg.endX - seg.startX) * ball.progress;
            ball.y = seg.startY + (seg.endY - seg.startY) * ball.progress;
        }
    } else {
        // Ball is falling — apply gravity
        ball.fallVy += GRAVITY * dt;
        ball.x += ball.fallVx * dt;
        ball.y += ball.fallVy * dt;

        // End game when ball leaves screen
        if (ball.y > cameraY + canvas.height + 300) {
            endGame();
        }
    }

    // Smooth camera follow
    const targetCameraY = ball.y - canvas.height * 0.7;
    cameraY += (targetCameraY - cameraY) * 0.1;

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 600 * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// ─────────────────────────────────────
// Drawing
// ─────────────────────────────────────
function drawBackground() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle grid
    ctx.strokeStyle = 'rgba(0, 255, 255, 0.03)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    const offsetY = -cameraY % gridSize;
    for (let y = offsetY; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
}

function drawPath() {
    ctx.save();
    ctx.translate(0, -cameraY);

    // Draw glowing path
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = PATH_WIDTH;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 25;
    ctx.shadowColor = '#00ffff';

    ctx.beginPath();
    for (let i = 0; i < segments.length; i++) {
        const s = segments[i];
        if (i === 0) ctx.moveTo(s.startX, s.startY);
        ctx.lineTo(s.endX, s.endY);
    }
    ctx.stroke();

    // Inner bright core
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = PATH_WIDTH * 0.3;
    ctx.stroke();

    ctx.restore();
}

function drawBall() {
    if (ball.falling && ball.y > cameraY + canvas.height + 100) return;

    ctx.save();
    ctx.translate(0, -cameraY);

    // Ball glow
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#00ffff';

    // Ball body
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    ctx.shadowBlur = 0;
    const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, BALL_RADIUS);
    grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
    grad.addColorStop(1, 'rgba(0, 255, 255, 0.2)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawParticles() {
    ctx.save();
    ctx.translate(0, -cameraY);

    for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawUI() {
    if (gameState === 'start') {
        // Start screen
        ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Title
        ctx.fillStyle = '#00ffff';
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#00ffff';
        ctx.font = 'bold 52px Arial';
        ctx.fillText('ZigZag Line', canvas.width / 2, canvas.height / 2 - 70);
        ctx.shadowBlur = 0;

        // Instructions
        ctx.fillStyle = '#ffffff';
        ctx.font = '22px Arial';
        ctx.fillText('Tap, Click, or Press Space', canvas.width / 2, canvas.height / 2 + 10);
        ctx.fillText('to change direction', canvas.width / 2, canvas.height / 2 + 40);

        // Best score
        ctx.fillStyle = '#00ffff';
        ctx.font = '18px Arial';
        ctx.fillText('Best: ' + bestScore, canvas.width / 2, canvas.height / 2 + 100);
    } else if (gameState === 'playing') {
        // Score (top-left)
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';

        ctx.fillStyle = '#00ffff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ffff';
        ctx.font = 'bold 40px Arial';
        ctx.fillText(score, 20, 20);
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.font = '16px Arial';
        ctx.fillText('Best: ' + bestScore, 20, 65);
    } else if (gameState === 'gameover') {
        // Game Over screen
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.fillStyle = '#ff0066';
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#ff0066';
        ctx.font = 'bold 52px Arial';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 60);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#ffffff';
        ctx.font = '32px Arial';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 0);

        if (score > 0 && score >= bestScore) {
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffff';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('New Best!', canvas.width / 2, canvas.height / 2 + 45);
            ctx.shadowBlur = 0;
        }

        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.font = '18px Arial';
        ctx.fillText('Tap or Press Space to Restart', canvas.width / 2, canvas.height / 2 + 100);
    }
}

// ─────────────────────────────────────
// Game Loop
// ─────────────────────────────────────
function gameLoop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1; // Cap delta time to avoid jumps
    if (dt <= 0) dt = 0.016;
    lastTime = timestamp;

    update(dt);

    // Clear and draw
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    drawPath();
    drawParticles();
    drawBall();
    drawUI();

    requestAnimationFrame(gameLoop);
}

// ─────────────────────────────────────
// Input Handling
// ─────────────────────────────────────
function handleInput() {
    if (gameState === 'start') {
        startGame();
    } else if (gameState === 'playing') {
        inputPressed = true;
    } else if (gameState === 'gameover') {
        startGame();
    }
}

// Mouse
canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    handleInput();
});

// Touch
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleInput();
}, { passive: false });

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        handleInput();
    }
});

// ─────────────────────────────────────
// Resize Handling
// ─────────────────────────────────────
window.addEventListener('resize', () => {
    resizeCanvas();
    generatePath();
    if (gameState === 'playing') {
        resetGame();
        gameState = 'playing';
    }
});

// ─────────────────────────────────────
// Initialize
// ─────────────────────────────────────
resizeCanvas();
generatePath();
ball.x = segments[0].startX;
ball.y = segments[0].startY;
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
