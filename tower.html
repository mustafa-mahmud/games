<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Stack Tower</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
    // ============================================
    // STACK TOWER - HTML5 Canvas Game
    // ============================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- Canvas Setup ---
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // --- Game Constants ---
    const BLOCK_HEIGHT = 30;
    const INITIAL_BLOCK_WIDTH = 200;
    const INITIAL_SPEED = 3;
    const SPEED_INCREMENT = 0.15;
    const MAX_SPEED = 10;
    const PARTICLE_COUNT = 20;
    const FALL_SPEED = 5;

    // --- Color Palette ---
    const COLORS = [
      '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4',
      '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F',
      '#BB8FCE', '#85C1E9', '#F8C471', '#82E0AA',
      '#F1948A', '#85929E', '#A3E4D7', '#FAD7A0'
    ];

    // --- Game State ---
    let gameState = 'start'; // 'start', 'playing', 'gameover'
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('stackTowerBest')) || 0;
    let stack = [];
    let currentBlock = null;
    let particles = [];
    let fallingPieces = [];
    let speed = INITIAL_SPEED;
    let direction = 1;
    let cameraY = 0;

    // --- Utility Functions ---
    function getColor(index) {
      return COLORS[index % COLORS.length];
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    // --- Particle Class ---
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = randomRange(-4, 4);
        this.vy = randomRange(-6, -2);
        this.life = 1;
        this.decay = randomRange(0.02, 0.05);
        this.size = randomRange(2, 5);
        this.color = color;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2;
        this.life -= this.decay;
        this.size *= 0.98;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.restore();
      }

      isDead() {
        return this.life <= 0;
      }
    }

    // --- Falling Piece Class ---
    class FallingPiece {
      constructor(x, y, width, color) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.vy = 0;
        this.rotation = 0;
        this.rotationSpeed = randomRange(-0.1, 0.1);
        this.color = color;
      }

      update() {
        this.y += this.vy;
        this.vy += 0.5;
        this.rotation += this.rotationSpeed;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x + this.width / 2, this.y + BLOCK_HEIGHT / 2);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = 0.7;
        ctx.fillRect(-this.width / 2, -BLOCK_HEIGHT / 2, this.width, BLOCK_HEIGHT);
        ctx.restore();
      }

      isOffScreen() {
        return this.y > canvas.height + 100;
      }
    }

    // --- Block Class ---
    class Block {
      constructor(x, y, width, color) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.color = color;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, BLOCK_HEIGHT);

        // Subtle highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.fillRect(this.x, this.y, this.width, BLOCK_HEIGHT * 0.4);
      }
    }

    // --- Initialize Game ---
    function initGame() {
      stack = [];
      particles = [];
      fallingPieces = [];
      score = 0;
      speed = INITIAL_SPEED;
      cameraY = 0;

      // Base block (static)
      const baseY = canvas.height - 100;
      const baseBlock = new Block(
        (canvas.width - INITIAL_BLOCK_WIDTH) / 2,
        baseY,
        INITIAL_BLOCK_WIDTH,
        getColor(0)
      );
      stack.push(baseBlock);

      // First moving block
      spawnBlock();
    }

    // --- Spawn New Block ---
    function spawnBlock() {
      const lastBlock = stack[stack.length - 1];
      const newY = lastBlock.y - BLOCK_HEIGHT;
      const newWidth = lastBlock.width;
      const newColor = getColor(stack.length);

      currentBlock = new Block(-newWidth, newY, newWidth, newColor);
      direction = 1;
    }

    // --- Drop Block ---
    function dropBlock() {
      if (!currentBlock || gameState !== 'playing') return;

      const lastBlock = stack[stack.length - 1];
      const current = currentBlock;

      // Calculate overlap
      const overlapStart = Math.max(current.x, lastBlock.x);
      const overlapEnd = Math.min(current.x + current.width, lastBlock.x + lastBlock.width);
      const overlapWidth = overlapEnd - overlapStart;

      if (overlapWidth <= 0) {
        // Missed completely - game over
        gameOver();
        return;
      }

      // Create the cut-off piece (falling)
      if (current.x < lastBlock.x) {
        const leftWidth = lastBlock.x - current.x;
        fallingPieces.push(new FallingPiece(current.x, current.y, leftWidth, current.color));
      }

      if (current.x + current.width > lastBlock.x + lastBlock.width) {
        const rightWidth = (current.x + current.width) - (lastBlock.x + lastBlock.width);
        fallingPieces.push(new FallingPiece(
          lastBlock.x + lastBlock.width,
          current.y,
          rightWidth,
          current.color
        ));
      }

      // Create landing particles
      const particleX = overlapStart + overlapWidth / 2;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle(particleX, current.y + BLOCK_HEIGHT, current.color));
      }

      // Add the overlapped part to the stack
      const placedBlock = new Block(overlapStart, current.y, overlapWidth, current.color);
      stack.push(placedBlock);

      score++;
      speed = Math.min(INITIAL_SPEED + score * SPEED_INCREMENT, MAX_SPEED);

      // Smooth camera follow
      const targetCameraY = Math.max(0, current.y - canvas.height * 0.4);
      cameraY = targetCameraY;

      // Spawn next block
      spawnBlock();
    }

    // --- Game Over ---
    function gameOver() {
      gameState = 'gameover';

      // Update best score
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('stackTowerBest', bestScore);
      }
    }

    // --- Restart Game ---
    function restartGame() {
      gameState = 'playing';
      initGame();
    }

    // --- Draw Functions ---
    function drawBackground() {
      // Dark gradient background
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#0f0f1a');
      gradient.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Subtle grid lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
      ctx.lineWidth = 1;
      const gridSize = 50;
      const offset = (cameraY % gridSize);

      for (let y = -gridSize + offset; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawUI() {
      // Score
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 48px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(score, canvas.width / 2, 80);

      // Best score
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.font = '16px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText(`Best: ${bestScore}`, canvas.width / 2, 110);
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(15, 15, 26, 0.9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Title
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 56px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('STACK TOWER', canvas.width / 2, canvas.height / 2 - 60);

      // Instructions
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.font = '18px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('Tap, Click, or Press Space to drop', canvas.width / 2, canvas.height / 2);

      // Start prompt
      ctx.fillStyle = getColor(0);
      ctx.font = 'bold 24px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('TAP TO START', canvas.width / 2, canvas.height / 2 + 60);

      // Best score
      if (bestScore > 0) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.font = '16px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillText(`Best Score: ${bestScore}`, canvas.width / 2, canvas.height / 2 + 120);
      }
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(15, 15, 26, 0.85)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Game Over text
      ctx.fillStyle = '#FF6B6B';
      ctx.font = 'bold 56px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

      // Score
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 36px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2);

      // Best score
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.font = '18px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText(`Best: ${bestScore}`, canvas.width / 2, canvas.height / 2 + 40);

      // Restart prompt
      ctx.fillStyle = getColor(score % COLORS.length);
      ctx.font = 'bold 24px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('TAP TO RESTART', canvas.width / 2, canvas.height / 2 + 100);
    }

    // --- Update Functions ---
    function update() {
      if (gameState !== 'playing') return;

      // Update current block position
      if (currentBlock) {
        currentBlock.x += speed * direction;

        // Bounce off edges
        if (currentBlock.x + currentBlock.width > canvas.width) {
          currentBlock.x = canvas.width - currentBlock.width;
          direction = -1;
        } else if (currentBlock.x < 0) {
          currentBlock.x = 0;
          direction = 1;
        }
      }

      // Update particles
      particles = particles.filter(p => {
        p.update();
        return !p.isDead();
      });

      // Update falling pieces
      fallingPieces = fallingPieces.filter(p => {
        p.update();
        return !p.isOffScreen();
      });
    }

    // --- Render Functions ---
    function render() {
      drawBackground();

      if (gameState === 'start') {
        drawStartScreen();
        return;
      }

      // Draw stack
      ctx.save();
      for (let i = 0; i < stack.length; i++) {
        const block = stack[i];
        const screenY = block.y - cameraY;
        if (screenY > -BLOCK_HEIGHT && screenY < canvas.height + BLOCK_HEIGHT) {
          ctx.save();
          ctx.translate(0, -cameraY);
          block.draw();
          ctx.restore();
        }
      }
      ctx.restore();

      // Draw current block
      if (currentBlock && gameState === 'playing') {
        ctx.save();
        ctx.translate(0, -cameraY);
        currentBlock.draw();
        ctx.restore();
      }

      // Draw particles
      for (const particle of particles) {
        ctx.save();
        ctx.translate(0, -cameraY);
        particle.draw();
        ctx.restore();
      }

      // Draw falling pieces
      for (const piece of fallingPieces) {
        ctx.save();
        ctx.translate(0, -cameraY);
        piece.draw();
        ctx.restore();
      }

      // Draw UI
      drawUI();

      // Draw game over screen
      if (gameState === 'gameover') {
        drawGameOverScreen();
      }
    }

    // --- Game Loop ---
    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    // --- Input Handling ---
    function handleInput() {
      if (gameState === 'start') {
        gameState = 'playing';
        initGame();
      } else if (gameState === 'playing') {
        dropBlock();
      } else if (gameState === 'gameover') {
        restartGame();
      }
    }

    // Mouse events
    canvas.addEventListener('click', handleInput);
    canvas.addEventListener('mousedown', (e) => {
      e.preventDefault();
      handleInput();
    });

    // Touch events
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleInput();
    });

    // Keyboard events
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        handleInput();
      }
    });

    // Prevent context menu on long press
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
    });

    // --- Start Game ---
    initGame();
    gameLoop();
  </script>
</body>
</html>
